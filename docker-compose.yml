services:
  bot:
    build: .
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./var:/app/var
    command: sh -c "alembic upgrade head && python -m app.main"
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bot
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  pgdata:
