x-app: &app
  build: .
  env_file:
    - path: .env
      required: false
  environment:
    DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-bot}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-bot}}
    REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  volumes:
    - app-var:/app/var
  logging: &json-logs
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  migrate:
    <<: *app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

  api:
    <<: *app
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "8000"
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  bot:
    <<: *app
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: python -m app.main
    restart: unless-stopped

  worker:
    <<: *app
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: python -m app.workers.upload_worker
    restart: unless-stopped
    stop_grace_period: 2m
    healthcheck:
      test: ["CMD", "python", "-c", "import pathlib, time; p=pathlib.Path('/tmp/yd_upd_approver_worker_heartbeat'); assert p.exists() and time.time() - p.stat().st_mtime < 30"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  outbox-worker:
    <<: *app
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: python -m app.workers.telegram_outbox_worker
    restart: unless-stopped
    stop_grace_period: 2m
    healthcheck:
      test: ["CMD", "python", "-c", "import pathlib, time; p=pathlib.Path('/tmp/yd_upd_approver_outbox_heartbeat'); assert p.exists() and time.time() - p.stat().st_mtime < 30"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bot}
      POSTGRES_USER: ${POSTGRES_USER:-bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging: *json-logs

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging: *json-logs

volumes:
  pgdata:
  app-var:
