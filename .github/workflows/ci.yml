name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bot
          POSTGRES_USER: bot
          POSTGRES_PASSWORD: bot
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U bot -d bot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql+asyncpg://bot:bot@localhost:5432/bot
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_ADMIN_IDS: "123456789"
      YANDEX_DISK_TOKEN: "test-token"
      YANDEX_DISK_ROOT: "disk:/Telegram Uploads"
      TEMP_STORAGE_DIR: ./var/tmp_uploads
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"
      - name: Format check
        run: ruff format --check .
      - name: Lint
        run: ruff check .
      - name: Migrations
        run: alembic upgrade head
      - name: Tests
        run: pytest
