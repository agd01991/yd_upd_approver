name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bot
          POSTGRES_USER: bot
          POSTGRES_PASSWORD: bot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bot -d bot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://bot:bot@localhost:5432/bot

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Format check
        run: ruff format --check .

      - name: Lint
        run: ruff check .

      - name: Check database connection
        run: |
          python - <<'PY'
          import asyncio
          import os
          import sqlalchemy as sa
          from sqlalchemy.ext.asyncio import create_async_engine

          async def main():
              url = os.environ["DATABASE_URL"]
              engine = create_async_engine(url)
              async with engine.connect() as conn:
                  result = await conn.execute(sa.text("select 1"))
                  print("DB OK:", result.scalar())
              await engine.dispose()

          asyncio.run(main())
          PY

      - name: Migrations
        run: alembic upgrade head

      - name: Tests
        run: pytest

      - name: Prepare Docker Compose environment
        run: |
          cp .env.example .env
          {
            echo "TELEGRAM_BOT_TOKEN="
            echo "YANDEX_DISK_TOKEN="
            echo "POSTGRES_DB=bot"
            echo "POSTGRES_USER=bot"
            echo "POSTGRES_PASSWORD=change-me-before-production"
            echo "DATABASE_URL=postgresql+asyncpg://bot:change-me-before-production@postgres:5432/bot"
            echo "REDIS_URL=redis://redis:6379/0"
          } >> "$GITHUB_ENV"

      - name: Validate production Compose config
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate development Compose config
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml config --quiet

      - name: Build Docker image
        run: docker build --no-cache -t yd-upd-approver:ci .

      - name: Verify Docker image hardening
        run: |
          test "$(docker image inspect yd-upd-approver:ci --format '{{.Config.User}}')" != ""
          test "$(docker image inspect yd-upd-approver:ci --format '{{.Config.User}}')" != "0"
          test "$(docker image inspect yd-upd-approver:ci --format '{{.Config.User}}')" != "root"
          docker run --rm --entrypoint python yd-upd-approver:ci -c "import os, pathlib; assert os.geteuid() != 0; assert not pathlib.Path('/app/.env').exists(); assert not any(pathlib.Path('/app/var/tmp_uploads').iterdir())"
